version: 1
applications:
  - appRoot: frontend/apps/web
    frontend:
      phases:
        preBuild:
          commands:
            - curl -fsSL https://bun.sh/install | bash
            - export PATH="$HOME/.bun/bin:$PATH"
            - cd ../../ && bun install
        build:
          commands:
            - export PATH="$HOME/.bun/bin:$PATH"
            - bun run build
        postBuild:
          commands:
            - cp -r .next/static .next/standalone/frontend/apps/web/.next/static 2>/dev/null || true
            - cp -r public .next/standalone/frontend/apps/web/public 2>/dev/null || true
      artifacts:
        baseDirectory: .next/standalone
        files:
          - '**/*'
      cache:
        paths:
          - ../../node_modules/**/*
          - .next/cache/**/*
