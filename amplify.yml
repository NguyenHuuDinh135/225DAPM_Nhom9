version: 1
applications:
  - appRoot: frontend/apps/web
    frontend:
      phases:
        preBuild:
          commands:
            - curl -fsSL https://bun.sh/install | bash
            - export PATH="$HOME/.bun/bin:$PATH"
            - cd ../../ && bun install
        build:
          commands:
            - export PATH="$HOME/.bun/bin:$PATH"
            - node ../../node_modules/next/dist/bin/next build
        postBuild:
          commands:
            - echo "Standalone contents:"
            - ls -la .next/standalone/ 2>/dev/null || echo "NO STANDALONE DIR"
            - find .next/standalone -name "required-server-files.json" 2>/dev/null || echo "NO RSF"
            - find .next/standalone -maxdepth 2 -type d 2>/dev/null | head -20
            - cp -r .next/static .next/standalone/.next/static 2>/dev/null || true
            - cp -r public .next/standalone/public 2>/dev/null || true
      artifacts:
        baseDirectory: .next/standalone
        files:
          - '**/*'
      cache:
        paths:
          - ../../node_modules/**/*
          - .next/cache/**/*
