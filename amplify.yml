version: 1
applications:
  - appRoot: frontend/apps/web
    frontend:
      phases:
        preBuild:
          commands:
            - curl -fsSL https://bun.sh/install | bash
            - export PATH="$HOME/.bun/bin:$PATH"
            - cd ../../ && bun install
        build:
          commands:
            - export PATH="$HOME/.bun/bin:$PATH"
            - bun run build
        postBuild:
          commands:
            - echo "=== DEBUG standalone ==="
            - find .next/standalone -name "required-server-files.json" 2>/dev/null || echo "RSF not found"
            - find .next/standalone -maxdepth 3 -type d 2>/dev/null | head -30 || echo "no standalone"
            - ls .next/standalone/node_modules/next/package.json 2>/dev/null && echo "next at root" || echo "next NOT at standalone root"
            - cp -r .next/static .next/standalone/.next/static 2>/dev/null || true
            - cp -r public .next/standalone/public 2>/dev/null || true
      artifacts:
        baseDirectory: .next/standalone
        files:
          - '**/*'
      cache:
        paths:
          - ../../node_modules/**/*
          - .next/cache/**/*
