version: 1
applications:
  - appRoot: frontend/apps/web
    frontend:
      phases:
        preBuild:
          commands:
            - curl -fsSL https://bun.sh/install | bash
            - export PATH="$HOME/.bun/bin:$PATH"
            - cd ../../ && bun install
        build:
          commands:
            - export PATH="$HOME/.bun/bin:$PATH"
            - bun run build
        postBuild:
          commands:
            - export PATH="$HOME/.bun/bin:$PATH"
            - mkdir -p node_modules
            - cp -rL ../../node_modules/next node_modules/next
            - cp -rL ../../node_modules/react node_modules/react
            - cp -rL ../../node_modules/react-dom node_modules/react-dom
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - ../../node_modules/**/*
          - .next/cache/**/*
