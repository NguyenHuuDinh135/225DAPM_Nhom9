version: 1
applications:
  - appRoot: frontend/apps/web
    frontend:
      phases:
        preBuild:
          commands:
            - curl -fsSL https://bun.sh/install | bash
            - export PATH="$HOME/.bun/bin:$PATH"
            - cd ../../ && bun install
        build:
          commands:
            - export PATH="$HOME/.bun/bin:$PATH"
            - bun run build
        postBuild:
          commands:
            - npm init -y 2>/dev/null || true
            - npm install next@16.1.6 react react-dom --legacy-peer-deps 2>/dev/null || true
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - ../../node_modules/**/*
          - .next/cache/**/*
