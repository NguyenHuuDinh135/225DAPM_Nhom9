version: 1
applications:
  - appRoot: frontend/apps/web
    frontend:
      phases:
        preBuild:
          commands:
            - curl -fsSL https://bun.sh/install | bash
            - export PATH="$HOME/.bun/bin:$PATH"
            - cd ../../../frontend && bun install
        build:
          commands:
            - export PATH="$HOME/.bun/bin:$PATH"
            - cd ../../../frontend && bun run build --filter=web
      artifacts:
        baseDirectory: .next/standalone
        files:
          - '**/*'
      cache:
        paths:
          - ../../../frontend/node_modules/**/*
          - .next/cache/**/*
