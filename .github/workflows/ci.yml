name: CI

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

jobs:
  backend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Restore dependencies
        run: dotnet restore backend/src/Web/Web.csproj

      - name: Build
        run: dotnet build backend/src/Web/Web.csproj --no-restore -c Release

      - name: Test
        run: dotnet test backend/backend.slnx --no-build --verbosity normal -c Release

  frontend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('frontend/**/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install Dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Lint
        working-directory: frontend
        run: bun run lint

      - name: Typecheck
        working-directory: frontend
        run: bun run typecheck

      - name: Build Web
        working-directory: frontend
        run: bun run build --filter=web
