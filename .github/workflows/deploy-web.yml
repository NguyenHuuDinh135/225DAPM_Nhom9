name: Deploy Web

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "frontend/**"

jobs:
  build-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('frontend/**/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install Dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Build Web
        working-directory: frontend
        run: bun run build --filter=web
        env:
          NEXT_PUBLIC_API_URL: http://placeholder.example.com

  # Amplify auto-deploys from GitHub — no manual deploy step needed.
  # This workflow just validates the build passes before Amplify picks it up.
