version: "3.8"
services:
  postgres:
    image: postgres:17-alpine
    container_name: backenddb-postgres
    environment:
      POSTGRES_DB: backendDb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
